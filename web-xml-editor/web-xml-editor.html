<html lang="en">
<head>
  <title>XML Editor</title>
  <style>

    /* reset */
    html, body, div, span, applet, object, iframe, h1, h2, h3, h4, h5, h6, p, blockquote, pre, a, abbr, acronym, address, big, cite, code, del, dfn, em, font, img, ins, kbd, q, s, samp, small, strike, strong, sub, sup, tt, var, b, u, i, center, dl, dt, dd, ol, ul, li, fieldset, form, label, legend, caption {
        margin: 0;
        padding: 0;
        border: 0;
        outline: 0;
        font-size: 100%;
        vertical-align: baseline;
        background: transparent;
    }

    body {
        height: 100%;
        background-color: #FFFFFF;
    }

    .gutter {
        background-color: #333333;
        background-repeat: no-repeat;
        background-position: 50%;
    }

    .gutter.gutter-horizontal {
        background-image: url('vertical.png');
        cursor: ew-resize;
    }

    .split, .split-flex {
        -webkit-box-sizing: border-box;
           -moz-box-sizing: border-box;
                box-sizing: border-box;

        overflow-y: auto;
        overflow-x: hidden;
    }
  
    .split.split-horizontal, .gutter.gutter-horizontal {
        height: 100%;
        float: left;
    }
    
    #preview {
        width:100%;
        height:100%;
    }
    
    .box {
        margin-top:10px;
        margin-left:10px;
        margin-right:10px;
    }   
    
    button {
        background-color: #333333;
        border: none;
        color: white;
        padding: 15px 32px;
        margin-right:5px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
    }
    
    button:hover {
        background-color: #f0832d;
        cursor: pointer;
    }
    
    .gray {
        color: white;
        background-color: #333333;
    }
    
    #editor {
        height:100%;
    }
    
</style>
</head>
<body>

    <div id="leftPanel" class="split split-horizontal">
        <iframe id="preview" src="https://fr.wikipedia.org/wiki/Main_Page" >
        </iframe>  
    </div>
    <div id="rightPanel" class="split split-horizontal">    
        <div class="box">  
            <button type="button" onclick="preview();">Preview</button>
            <button type="button" onclick="deploy();">Deploy</button>
        </div>
        <div id="editor" class="gray box">
            Editor goes here
        </div>
    </div>

</body>
<script src="split-1.3.5.js"></script>
<script>

    Split(['#leftPanel', '#rightPanel'], {
        sizes: [65, 35],
        minSize: 200
    });
    
    function preview() {
        var preview = document.getElementById('preview');
        preview.src = preview.src;
    }
    
    function deploy() {
      alert('Deploy');
    }
    
</script>
</html>
